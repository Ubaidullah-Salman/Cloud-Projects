version: 0.2
phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install -r flask-cicd-app/requirements.txt
  pre_build:
    commands:
      - echo Running tests...
      - cd flask-cicd-app && pytest tests/
  build:
    commands:
      - echo Build complete
artifacts:
  files:
    - '**/*'
  base-directory: flask-cicd-app
