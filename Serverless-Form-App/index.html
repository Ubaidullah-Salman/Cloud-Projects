<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Contact Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0e1521;
      --border: rgba(0, 220, 180, 0.15);
      --accent: #00dcb4;
      --accent2: #3a7bff;
      --text: #e8f0fe;
      --muted: #6b7fa3;
      --danger: #ff4d6d;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 220, 180, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 220, 180, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Floating orbs */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(58, 123, 255, 0.08) 0%, transparent 70%);
      top: -150px;
      right: -150px;
      pointer-events: none;
      z-index: 0;
      animation: drift 12s ease-in-out infinite;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-40px, 40px); }
    }

    .orb2 {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 220, 180, 0.06) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
      pointer-events: none;
      z-index: 0;
      animation: drift2 15s ease-in-out infinite;
    }

    @keyframes drift2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, -30px); }
    }

    /* Header */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 12, 20, 0.8);
      backdrop-filter: blur(12px);
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .logo span {
      color: var(--accent);
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(0, 220, 180, 0.06);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Main layout */
    main {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 65px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .wrapper {
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0, 220, 180, 0.05),
        0 20px 60px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .card-header {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(0, 220, 180, 0.04), rgba(58, 123, 255, 0.04));
    }

    .tag {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(0, 220, 180, 0.1);
      border: 1px solid rgba(0, 220, 180, 0.2);
      border-radius: 4px;
      padding: 0.25rem 0.6rem;
      margin-bottom: 1rem;
    }

    .card-header h1 {
      font-family: 'Outfit', sans-serif;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .card-header p {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Form */
    .card-body {
      padding: 1.8rem 2rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    input, textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: 'Geist Mono', monospace;
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input::placeholder, textarea::placeholder {
      color: rgba(107, 127, 163, 0.5);
    }

    input:focus, textarea:focus {
      border-color: rgba(0, 220, 180, 0.5);
      background: rgba(0, 220, 180, 0.03);
      box-shadow: 0 0 0 3px rgba(0, 220, 180, 0.08);
    }

    textarea {
      resize: none;
      height: 110px;
    }

    /* Submit button */
    .btn {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      color: #080c14;
      font-family: 'Outfit', sans-serif;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      margin-top: 0.4rem;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.15);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn:hover::before { opacity: 1; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(0, 220, 180, 0.3); }
    .btn:active { transform: translateY(0); }

    /* Response message */
    #response {
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      font-size: 0.8rem;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #response.success {
      background: rgba(0, 220, 180, 0.08);
      border: 1px solid rgba(0, 220, 180, 0.25);
      color: var(--accent);
      display: block;
    }

    #response.error {
      background: rgba(255, 77, 109, 0.08);
      border: 1px solid rgba(255, 77, 109, 0.25);
      color: var(--danger);
      display: block;
    }

    /* Footer strip */
    .card-footer {
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .powered {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .lambda-icon {
      width: 14px;
      height: 14px;
      fill: var(--accent);
      opacity: 0.7;
    }

    @media (max-width: 500px) {
      .form-row { grid-template-columns: 1fr; }
      .card-header, .card-body { padding-left: 1.4rem; padding-right: 1.4rem; }
      header { padding: 1rem 1.4rem; }
    }
  </style>
</head>
<body>

  <div class="orb2"></div>

  <header>
    <div class="logo">cloud<span>/</span>form</div>
    <div class="status-pill">
      <div class="status-dot"></div>
      Serverless · AWS Lambda
    </div>
  </header>

  <main>
    <div class="wrapper">
      <div class="card">
        <div class="card-header">
          <div class="tag">DevSecOps · Registration</div>
          <h1>Get In Touch</h1>
          <p>Submit your details and we'll store them securely via AWS Lambda + DynamoDB.</p>
        </div>

        <div class="card-body">
          <div class="form-row">
            <div class="field">
              <label for="fname">First Name</label>
              <input type="text" id="fname" placeholder="John" />
            </div>
            <div class="field">
              <label for="lname">Last Name</label>
              <input type="text" id="lname" placeholder="Doe" />
            </div>
          </div>

          <div class="field">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="john@example.com" />
          </div>

          <div class="field">
            <label for="message">Message</label>
            <textarea id="message" placeholder="Write your message here..."></textarea>
          </div>

          <button class="btn" onclick="submitForm()">
            Submit →
          </button>

          <div id="response"></div>
        </div>

        <div class="card-footer">
          <span>Encrypted · Serverless</span>
          <div class="powered">
            <svg class="lambda-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 21l7-14 4 8h4l3 6H3z"/>
            </svg>
            Powered by AWS Lambda
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    async function submitForm() {
      const API_URL = "https://e0ky9wobwd.execute-api.us-east-1.amazonaws.com/submit"; // <-- replace this

      const fname = document.getElementById("fname").value.trim();
      const lname = document.getElementById("lname").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();
      const responseEl = document.getElementById("response");

      if (!fname || !lname || !email || !message) {
        responseEl.className = 'error';
        responseEl.textContent = '⚠ Please fill in all fields before submitting.';
        return;
      }

      const btn = document.querySelector('.btn');
      btn.textContent = 'Sending...';
      btn.disabled = true;

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: `${fname} ${lname}`, email, message })
        });

        const result = await res.json();
        responseEl.className = 'success';
        responseEl.textContent = '✓ ' + (result.message || 'Submitted successfully!');
        document.getElementById("fname").value = '';
        document.getElementById("lname").value = '';
        document.getElementById("email").value = '';
        document.getElementById("message").value = '';
      } catch (err) {
        responseEl.className = 'error';
        responseEl.textContent = '✗ Something went wrong. Please try again.';
      }

      btn.textContent = 'Submit →';
      btn.disabled = false;
    }
  </script>

</body>
</html>
